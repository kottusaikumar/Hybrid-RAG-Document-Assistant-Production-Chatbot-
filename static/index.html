<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="logo">
                <i class="ph-fill ph-brain"></i>
                <div>
                    <h1>Document Assistant</h1>
                    <span class="status">● Hybrid RAG Active</span>
                </div>
            </div>
            <div class="header-actions">
                <input type="file" id="pdf-upload" accept="application/pdf" style="display:none">
                <button id="upload-btn" title="Upload new PDF for indexing">
                    <i class="ph-bold ph-upload-simple"></i> Reindex PDF
                </button>
            </div>
        </header>

        <main class="chat-history" id="chat-history">
            <div class="message ai">
                <div class="avatar"><i class="ph-bold ph-robot"></i></div>
                <div class="message-content">
                    <p>Hello! I am your locally-hosted document assistant.
                       Drop any PDF into the <strong>pdfs/</strong> folder and index it,
                       or upload one directly with the button above — then ask me anything about it.</p>
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chat-form">
                <textarea id="question-input" placeholder="Ask a question…" rows="1" required></textarea>
                <button type="submit" id="send-button" title="Send">
                    <i class="ph-bold ph-paper-plane-right"></i>
                </button>
            </form>
            <div class="footer-note">Fully local · Hybrid Search · Ollama</div>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
